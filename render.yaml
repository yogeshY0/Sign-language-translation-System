services:
  - type: web
    name: sign-language-translator
    env: python
    pythonVersion: "3.11"
    buildCommand: |
      apt-get update && apt-get install -y espeak libespeak-dev
      pip install -r requirements.txt
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT --workers 1 --threads 2 --timeout 120
